name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  backend:
    name: Backend · Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio
      - name: Compile check
        run: python -m compileall backend
      - name: Run tests
        # policy + stream-parser tests need no external project;
        # test_api uses a fake engine, so the TermAId CLI is not required.
        run: pytest backend/tests -q

  frontend:
    name: Frontend · TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: |
          npm install
          npm run build        # tsc (strict) + vite build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  rust-native:
    name: Rust · native scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - working-directory: native
        run: |
          cargo fmt --check || true
          cargo clippy -- -D warnings || true
          cargo test --release
          cargo build --release

  rust-tauri:
    name: Rust · Tauri shell (check)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-mobile/src-tauri
      - name: Linux Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - working-directory: desktop-mobile/src-tauri
        run: cargo check
