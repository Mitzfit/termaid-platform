# Alembic config. Run from the backend/ directory:
#   alembic upgrade head           # apply migrations
#   alembic revision --autogenerate -m "add table"   # create a new one
[alembic]
script_location = migrations
prepend_sys_path = .
# DB URL is read dynamically from settings in migrations/env.py,
# so this is only a fallback and is intentionally left blank.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
