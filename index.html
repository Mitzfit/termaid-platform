<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TermAId</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Login Panel -->
  <div id="login" class="panel">
    <h1>TermAId</h1>
    <div class="sub">Enter your credentials to continue.</div>
    <input type="text" id="username" placeholder="Username" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <div class="row">
      <button id="loginBtn">Log in</button>
      <button id="registerBtn" class="ghost">Create account</button>
    </div>
    <div id="authMsg" class="msg"></div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <header>
      <div class="dot live" id="statusDot"></div>
      <div class="title">TermAId</div>
      <div id="status" class="status">connecting...</div>
      <button id="logoutBtn" class="ghost small" style="margin-left: 1rem;">Logout</button>
    </header>
    
    <div id="terminal" class="terminal" aria-live="polite"></div>
    
    <div class="inputline">
      <span class="prompt">›</span>
      <input type="text" id="cmd" placeholder="type a command or ask a question..." autocomplete="off" spellcheck="false" autofocus>
    </div>
  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
